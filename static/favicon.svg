<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield background -->
  <path d="M50 10 L85 25 L85 50 Q85 75 50 90 Q15 75 15 50 L15 25 Z" 
        fill="url(#shieldGradient)" 
        stroke="#8b5cf6" 
        stroke-width="2"/>
  
  <!-- AI Symbol (circuit pattern) -->
  <circle cx="50" cy="45" r="8" fill="#ffffff" opacity="0.9"/>
  <circle cx="35" cy="35" r="4" fill="#ffffff" opacity="0.8"/>
  <circle cx="65" cy="35" r="4" fill="#ffffff" opacity="0.8"/>
  <circle cx="35" cy="55" r="4" fill="#ffffff" opacity="0.8"/>
  <circle cx="65" cy="55" r="4" fill="#ffffff" opacity="0.8"/>
  
  <!-- Connecting lines -->
  <line x1="42" y1="45" x2="35" y2="35" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  <line x1="58" y1="45" x2="65" y2="35" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  <line x1="42" y1="45" x2="35" y2="55" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  <line x1="58" y1="45" x2="65" y2="55" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  
  <!-- Lock symbol at bottom -->
  <rect x="45" y="60" width="10" height="8" rx="1" fill="#ffffff" opacity="0.9"/>
  <path d="M47 60 L47 56 Q47 53 50 53 Q53 53 53 56 L53 60" 
        stroke="#ffffff" 
        stroke-width="2" 
        fill="none" 
        opacity="0.9"/>
</svg>

